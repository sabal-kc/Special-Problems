run:
  # systems: [traditional, gemini]   # or [traditional] or [gemini] to run only one
  systems: [traditional]
  batch_size: 1000
  warm_runs: 10
  timeout_seconds: 30
  retry:
    max_attempts: 2
    backoff_seconds: 1.0

client:
  sentiment_csv_path: llm_input/sentiment_input.csv
  output_dir: results/latency_cost

traditional:
  # endpoint: http://REPLACE_WITH_EC2_HOST:8000/v1/sentiment
  # endpoint: http://127.0.0.1:8000/v1/sentiment
  endpoint: http://54.242.38.69:8000/v1/sentiment

sequential:
  batch_sizes: [1, 10, 1000, 5000]
  runs_per_batch: 3

concurrent:
  batch_size: 1000
  concurrency_levels: [1, 2, 4, 8, 16, 32, 64, 128, 256, 512, 1024]
  duration_seconds: 60

gemini:
  model: gemini-3-pro-preview
  endpoint_template: https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent
  api_key_env: GEMINI_API_KEY

pricing:
  file: benchmarks/pricing.yaml
